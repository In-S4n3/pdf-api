services:
  api:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./docs:/app/docs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    environment:
      - ENVIRONMENT=development
